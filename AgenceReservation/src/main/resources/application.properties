server.port=8081

spring.datasource.url=jdbc:mysql://mysql:3306/agencereservation
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

app.base-url=${baseUrl}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.activemq.broker-url=tcp://activemq:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.packages.trust-all=true



spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.base-url=https://api-m.sandbox.paypal.com

cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}
cloudinary.secure=true
